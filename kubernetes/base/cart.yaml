apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: retail-app
spec:
  selector:
    app: cart
  ports:
    - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
        - name: cart
          image: public.ecr.aws/aws-containers/retail-store-sample-cart:latest
          ports:
            - containerPort: 8080
          env:
            - name: RETAIL_CART_PERSISTENCE_PROVIDER
              value: "dynamodb"
            - name: RETAIL_CART_PERSISTENCE_DYNAMODB_TABLE_NAME
              value: "project-bedrock-catalog"
            - name: RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE
              value: "true"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi