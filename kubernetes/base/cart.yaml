apiVersion: v1
kind: Service
metadata:
  name: carts
  namespace: retail-app
spec:
  selector:
    app: cart
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: carts
  namespace: retail-app
data:
  RETAIL_CART_PERSISTENCE_PROVIDER: dynamodb
  RETAIL_CART_PERSISTENCE_DYNAMODB_TABLE_NAME: project-bedrock-catalog
  RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE: "true"
  AWS_REGION: us-east-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
        - name: cart
          image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.6.1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: carts
          resources:
            requests:
              cpu: 100m
              memory: 256Mi