apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: checkout
  ports:
    - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: {{ .Values.checkout.image }}
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: RABBITMQ_HOST
              value: {{ .Values.rabbitmq.host | quote }}
            - name: RABBITMQ_PORT
              value: {{ .Values.rabbitmq.port | quote }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi