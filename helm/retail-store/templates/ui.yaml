apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: ui
  ports:
    - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: {{ .Values.ui.image }}
          ports:
            - containerPort: 8080
          env:
            - name: ENDPOINTS_CATALOG
              value: "http://catalog:8080"
            - name: ENDPOINTS_CARTS
              value: "http://cart:8080"
            - name: ENDPOINTS_ORDERS
              value: "http://orders:8080"
            - name: ENDPOINTS_CHECKOUT
              value: "http://checkout:8080"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi