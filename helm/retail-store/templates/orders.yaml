apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: orders
  ports:
    - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: {{ .Values.orders.image }}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_RABBITMQ_HOST
              value: {{ .Values.rabbitmq.host | quote }}
            - name: SPRING_RABBITMQ_PORT
              value: {{ .Values.rabbitmq.port | quote }}
            - name: SPRING_RABBITMQ_USERNAME
              value: {{ .Values.rabbitmq.user | quote }}
            - name: SPRING_RABBITMQ_PASSWORD
              value: {{ .Values.rabbitmq.password | quote }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi