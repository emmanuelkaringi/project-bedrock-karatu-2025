apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: catalog
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-mysql
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Endpoints
metadata:
  name: catalog-mysql
  namespace: {{ .Release.Namespace }}
subsets:
  - addresses:
      - ip: {{ .Values.rds.mysql.host }}
    ports:
      - port: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: {{ .Values.images.catalog }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: catalog
          env:
            - name: DB_USER
              value: {{ .Values.rds.mysql.user | quote }}
            - name: DB_PASSWORD
              value: {{ .Values.rds.mysql.password | quote }}
            - name: DB_NAME
              value: {{ .Values.rds.mysql.database | quote }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog
  namespace: {{ .Release.Namespace }}
data:
  RETAIL_CATALOG_PERSISTENCE_PROVIDER: mysql
  RETAIL_CATALOG_PERSISTENCE_ENDPOINT: catalog-mysql:3306
  RETAIL_CATALOG_PERSISTENCE_DB_NAME: {{ .Values.rds.mysql.database }}
  RETAIL_CATALOG_SEARCH_ENABLED: "false"